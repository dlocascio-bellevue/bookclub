<!DOCTYPE html>
<html xmlns:th='http://www.thymeleaf.org'>
    <head>
        <meta charset='UTF-8'>
        <title>Bookclub | New Wishlist Item</title>
        <!-- Bootstrap. (2026). Bootstrap CDN https://getbootstrap.com/ -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
              rel="stylesheet"
              integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
              crossorigin="anonymous">
    </head>
    <body>
        <!-- Display header fragment -->
        <div th:insert="~{fragments/header :: header}"></div>
        <!-- Display page title -->
        <div class="container py-5" style="width: 50%;">
            <div class="row">
                <div class="col-12">
                    <h1 class="text-center">New Wishlist Item Form</h1>
                    <!-- Form for creating a new WishlistItem. -->
                    <form action='#' th:action='@{/wishlist}' th:object='${wishlistItem}' method='post'>
                        <!-- ISBN input field with validation message. -->
                        <div class='mb-3'>
                            <label for='isbn' class='form-label'>ISBN</label>
                            <input type='text' class='form-control' id='isbn' name='isbn' th:field='*{isbn}' />
                            <small th:if='${#fields.hasErrors("isbn")}' style='color: red;' th:errors='*{isbn}'></small>
                        </div>
                        <!-- Title input field with validation message. -->
                        <div class='mb-3'>
                            <label for='title' class='form-label'>Title</label>
                            <input type='text' class='form-control' id='title' name='title' th:field='*{title}' />
                            <small th:if='${#fields.hasErrors("title")}' style='color: red;' th:errors='*{title}'></small>
                        </div>
                        <!-- Submit button. -->
                        <button type='submit' class='btn btn-primary float-end'>Save</button>
                    </form>
                    <br/>
                    <br/>
                    <!-- Link to return back to wishlist page. -->
                    <a href='/wishlist' th:href='@{/wishlist}'>Return to wishlist</a>
                </div>
            </div>    
        </div>
        <div th:insert="~{fragments/scriptFooter :: scriptFooter}"></div>
    </body>
</html>
