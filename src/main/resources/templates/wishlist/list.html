<!DOCTYPE html>
<html xmlns:th='http://www.thymeleaf.org'>
    <head>
        <meta charset='UTF-8'>
        <title>Bookclub | Wishlist</title>
        <!-- Bootstrap. (2026). Bootstrap CDN https://getbootstrap.com/ -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
              rel="stylesheet"
              integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
              crossorigin="anonymous">
    </head>
    <body>
        <!-- Display header fragment -->
        <div th:insert="~{fragments/header :: header}"></div>
        <!-- Display page title -->
        <div class="container py-5" style="width: 50%;">
            <div class="row">
                <div class="col-12">
                    <h1 class="text-center">My Wishlist</h1>
                </div>
            </div>    
            <p class='text-center'>
                <!-- Link to create a new wishlist item. -->
                <a href="/wishlist/new" th:href="@{/wishlist/new}" class='btn btn-outline-secondary text-center'>New Wishlist Item</a>
            </p>
            <div id='wishlist'></div>
        </div>

        <!-- Bootstrap JS and dependencies -->
        <script type="text/javascript">
            class HttpClient {
                async get(url, params = "") {
                    url = new URL(url);
                    url.search = new URLSearchParams(params).toString();

                    console.log(url.toString());

                    const res = await fetch(url.toString(), {
                        method: 'GET',
                    });
                    return res.json();
                }
            }

            // Function to build an HTML table from a list of books.
            function buildTable (books) {
                let tableString = `<table class="table"><tr><th>ISBN</th><th>Title</th><th>Functions</th></tr>`;

                for (let book of books) {
                    tableString += `<tr><td>${book.isbn}</td><td>${book.title}</td><td><a href="#">Edit</a> | <a href="#">Delete</a></td></tr>`;
                }

                tableString += `</table>`

                return tableString;
            }

            const http = new HttpClient();

            // Fetch the wishlist items from the API and display them in the table.
            http.get('http://localhost:8080/api/wishlist').then(res => {
                console.log(res);
                document.getElementById("wishlist").innerHTML = buildTable(res);
            }).catch(e => {
                console.log(e);
            });
        </script>
        <div th:insert="~{fragments/scriptFooter :: scriptFooter}"></div>
    </body>
</html>
