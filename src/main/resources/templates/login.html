<!DOCTYPE html>
<html xmlns:th='http://www.thymeleaf.org'>
    <head>
        <meta charset='UTF-8'>
        <title>Bookclub | Login</title>
        <!-- Bootstrap. (2026). Bootstrap CDN https://getbootstrap.com/ -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
              rel="stylesheet"
              integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
              crossorigin="anonymous">
    </head>
    <body>
        <!-- Display page title -->
        <div class="container py-5" style="width: 50%;">
            <div class="row">
                <div class="col-12">
                    <h1 class="text-center">Login Form</h1>
                    <!-- Form for creating a new WishlistItem. -->
                    <form name='f' th:action='@{/login}' method='post'>
                        <div th:if='${param.error}' class='alert alert-danger' role='alert'>Invalid username or password.</div>
                        <div th:if='${param.logout}' class='alert alert-success' role='alert'>You have been logged out.</div>
                        <div class='mb-3'>
                            <!-- Username input field with validation message. -->
                            <label for='username' class='form-label'>Username</label>
                            <input type='text' class='form-control' id='username' name='username' />
                            <!-- Password input field with validation message. -->
                            <label for='password' class='form-label'>Password</label>
                            <input type='password' class='form-control' id='password' name='password' />
                        </div>
                        <!-- Login button. -->
                        <button type='submit' class='btn btn-primary'>Login</button>
                    </form>
                </div>
                <br/>
                <br/>
            </div>
        </div>    
        <div th:insert="~{fragments/scriptFooter :: scriptFooter}"></div>
    </body>
</html>
