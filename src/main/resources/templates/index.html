<!DOCTYPE html>
<html xmlns:th='http://www.thymeleaf.org'>
    <head>
        <meta charset='UTF-8'>
        <title>Bookclub | Welcome</title>
        <!-- Bootstrap. (2026). Bootstrap CDN https://getbootstrap.com/ -->
        <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css' 
              rel='stylesheet' 
              integrity='sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB' 
              crossorigin='anonymous'>
    </head>
    <body>
        <div th:insert='~{fragments/header :: header}'></div>
        <main>
            <section class='py-5 text-center container'>
                <div class='row py-lg-5'>
                    <div class='col-lg-6 col-md-8 mx-auto'>
                        <h1 class='fw-light'>Book Club</h1>
                        <p class='lead text-muted'>
                            Welcome to the Book Club app, your "one stop
                            shop" for all of your book club needs.  Below you will find a list of
                            this months top 10 favorite books.  Select the book to see it's details.
                        </p>
                    </div>
                </div>
            </section>
            <!-- W3Schools. (2026). Bootstrap 5 Cards. https://www.w3schools.com/bootstrap5/bootstrap_cards.php -->
            <div class="container">
                <div class="row">
                    <div class="col-lg-4 mb-3" th:each="book : ${books}">
                        <div class="card">
                            <div class="card-body">
                                <!-- Display book title and description -->
                                <p class="card-text">
                                    <span th:text="${book.getTitle()}"></span>
                                    <br />
                                    <small class="text-muted"><em th:text="${book.getDescription()}"></em></small>
                                </p>   
                                <!-- View button links to the book details page by passing ISBN variable to the controller. -->
                                <div class="btn-group">
                                    <a href="#" th:href="@{/{id}(id=${book.getIsbn()})}" class="btn btn-sm btn-outline-secondary">View</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <div th:insert='~{fragments/footer :: footer}'></div>
        <div th:insert='~{fragments/scriptFooter :: scriptFooter}'></div>
    </body>
</html>
